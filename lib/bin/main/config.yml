trakteer:
  api-key: "YOUR_API_KEY_HERE"

groups:
  free:
    max_savepoints: 3
    max_teleports: 5
  supporter:
    max_savepoints: 10
    max_teleports: 15
  admin:
    max_savepoints: 25
    max_teleports: 25
  developer:
    max_savepoints: -1
    max_teleports: -1

settings:
  cooldown_hours: 24
  teleport_warmup_seconds: 3
  request_expire_seconds: 30

messages:
  no_permission: "&cYou don't have permission to do that."
  limit_reached: "&cLimit reached! Try again in &e{time}&c."
  teleport_warmup: "&eTeleporting in &6{seconds}&e second(s)... Don't move!"
  teleport_cancelled_move: "&cTeleport cancelled — you moved!"
  teleport_cancelled_damage: "&cTeleport cancelled — you took damage!"
  teleport_success: "&aTeleported to &6{destination}&a!"
  savepoint_saved: "&aSave point &6{name}&a created!"
  savepoint_deleted: "&cSave point &6{name}&c deleted."
  savepoint_not_found: "&cSave point &6{name}&c not found."
  savepoint_limit: "&cYou've reached your save point limit &7({max} max)&c."
  request_sent: "&eTeleport request sent to &6{player}&e. Expires in 30s."
  request_received: "&6{player}&e wants to teleport to you. &a/tpx accept &eor &c/tpx deny"
  request_accepted: "&a{player} accepted your teleport request."
  request_denied: "&c{player} denied your teleport request."
  request_expired: "&cYour teleport request to &6{player}&c has expired."
  request_none: "&cYou have no pending teleport requests."
  gui_title: "&8Your Save Points &7({current}/{max})"
