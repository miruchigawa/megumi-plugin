  tpx_already_pending: "&cYou already have a pending request!"
  tpx_limit_requester: "&cThe requester has reached their teleport limit."
  tpx_denied_confirmation: "&cRequest denied."
  player_not_found: "&cPlayer {player} not found or offline."
  player_offline: "&cThe requester is no longer online."
  savepoint_invalid_name: "&cInvalid name! Alphanumeric + underscores only, max 20 chars."
  admin_usage: "&cUsage: /tpxadmin <reset|setgroup|clearoverride|info>"
